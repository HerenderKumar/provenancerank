# Nginx as the edge load balancer in front of two API replicas.
#
# Default strategy is round-robin. Swap the commented directive in `upstream`
# to switch algorithm:
#   least_conn;             # send to the replica with fewest active conns
#   ip_hash;                # sticky by client IP (session affinity)
#   server api1 weight=3;   # weighted round-robin (give api1 3x the traffic)
# Passive health checks (max_fails/fail_timeout) take a bad replica out of
# rotation; /health/ready is the app-level readiness probe.

worker_processes auto;
events { worker_connections 1024; }

http {
    access_log /dev/stdout;
    error_log  /dev/stderr warn;
    sendfile on;
    keepalive_timeout 65;

    upstream provenancerank_api {
        # least_conn;        # <- uncomment to switch from round-robin
        server api1:8000 max_fails=3 fail_timeout=15s;
        server api2:8000 max_fails=3 fail_timeout=15s;
        keepalive 32;
    }

    # basic edge rate limit (defense in depth; app also rate-limits per identity)
    limit_req_zone $binary_remote_addr zone=edge:10m rate=30r/s;

    server {
        listen 80;
        server_name _;

        location /health {
            proxy_pass http://provenancerank_api;
        }

        # Server-Sent Events: no buffering, long read timeout
        location ~ ^/rank/.*/stream$ {
            proxy_pass http://provenancerank_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            limit_req zone=edge burst=60 nodelay;
            proxy_pass http://provenancerank_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_next_upstream error timeout http_502 http_503;
            proxy_connect_timeout 3s;
            proxy_read_timeout 120s;
        }
    }
}
