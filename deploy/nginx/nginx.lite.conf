# Edge proxy for the LITE stack — a single API replica (no load balancing).
# Same routing as the full nginx.conf, just one upstream server.

worker_processes auto;
events { worker_connections 1024; }

http {
    access_log /dev/stdout;
    error_log  /dev/stderr warn;
    sendfile on;
    keepalive_timeout 65;

    upstream provenancerank_api {
        server api1:8000 max_fails=3 fail_timeout=15s;
        keepalive 32;
    }

    limit_req_zone $binary_remote_addr zone=edge:10m rate=30r/s;

    server {
        listen 80;
        server_name _;

        location /health {
            proxy_pass http://provenancerank_api;
        }

        # Server-Sent Events: no buffering, long read timeout
        location ~ ^/rank/.*/stream$ {
            proxy_pass http://provenancerank_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            limit_req zone=edge burst=60 nodelay;
            proxy_pass http://provenancerank_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_next_upstream error timeout http_502 http_503;
            proxy_connect_timeout 3s;
            proxy_read_timeout 120s;
        }
    }
}
