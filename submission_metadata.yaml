# ============================================================================
# AI tools declaration (transparency only — not penalized)
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude as a pair-programmer for architecture discussion, code review and
  drafting. All design decisions — the two-phase split, the feature taxonomy
  calibrated to the real skill vocabulary, the honeypot rules, the gate-vs-penalty
  policy — were reviewed and validated by the team against the dataset. No
  candidate data was sent to any hosted LLM; the ranking step makes zero network
  calls. The optional Gemini JD-deconstruction step is offline-only and has a
  hardcoded fallback, so the system runs with no API keys.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase system. Offline precompute builds a 40-feature materialised view per
  candidate, sentence-transformer embeddings, a BM25 index, and an XGBoost fit
  scorer trained on a proxy relevance label (no hire/reject labels exist). The
  online ranker (no network, CPU, <5 min) reads those artifacts: vectorised hard
  gates drop honeypots, all-consulting careers and keyword stuffers; hybrid
  retrieval (BM25 + dense cosine, RRF-fused) plus the ML fit score plus a
  behavioural composite combine into a final score. Notice period, location and
  wrong-specialisation are heavy penalties, not hard gates, because the JD keeps
  those candidates "in scope". The decisive signal is real retrieval/IR/ranking
  experience at product companies, verified by on-platform assessment scores —
  not raw AI-keyword count, which is the trap the dataset sets. Honeypots are
  detected by impossible career arithmetic and forced to score 0; honeypot rate
  in the top 100 is 0. Ranking 100K candidates takes a few seconds.

